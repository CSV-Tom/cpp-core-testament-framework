name: CI

on:
  push:
  pull_request:

jobs:
  unix:
    name: ${{ matrix.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC with libstdc++
            os: ubuntu-24.04
            toolchain: toolchains/gcc-toolchain.cmake
            packages: ""
            build_type: Debug
          - name: GCC with libstdc++
            os: ubuntu-24.04
            toolchain: toolchains/gcc-toolchain.cmake
            packages: ""
            build_type: Release
          - name: Clang with libstdc++
            os: ubuntu-24.04
            toolchain: toolchains/clang-toolchain.cmake
            packages: ""
            build_type: Debug
          - name: Clang with libstdc++
            os: ubuntu-24.04
            toolchain: toolchains/clang-toolchain.cmake
            packages: ""
            build_type: Release
          - name: Clang with libc++
            os: ubuntu-24.04
            toolchain: toolchains/clang-libcxx-toolchain.cmake
            packages: libc++-dev libc++abi-dev
            build_type: Debug
          - name: AppleClang with libc++
            os: macos-latest
            toolchain: toolchains/clang-toolchain.cmake
            packages: ""
            build_type: Debug

    steps:
      - uses: actions/checkout@v6

      - name: Install standard library
        if: matrix.packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install --yes ${{ matrix.packages }}

      - name: Configure
        env:
          CXXFLAGS: -Werror
        run: >-
          cmake -S . -B build
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }}

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure -LE integration

      - name: Install and test consumer
        run: ctest --test-dir build --output-on-failure -L integration

  sanitizers:
    name: Clang ASan, LSan and UBSan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        env:
          CXXFLAGS: -Werror
        run: cmake --preset sanitizers

      - name: Build
        run: cmake --build --preset sanitizers

      - name: Test
        run: ctest --preset sanitizers -LE integration

  thread-sanitizer:
    name: GCC TSan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        env:
          CXXFLAGS: -Werror
        run: cmake --preset thread-sanitizer

      - name: Build
        run: cmake --build --preset thread-sanitizer

      - name: Configure TSan address space
        run: sudo sysctl vm.mmap_rnd_bits=28

      - name: Test
        run: ctest --preset thread-sanitizer -LE integration

  arm-linux:
    name: ARM Linux hard-float
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install cross compiler and emulator
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++-arm-linux-gnueabihf qemu-user

      - name: Configure
        env:
          CXXFLAGS: -Werror
        run: cmake --preset arm-linux-gnueabihf-debug

      - name: Build
        run: cmake --build --preset arm-linux-gnueabihf-debug

      - name: Test
        run: ctest --preset arm-linux-gnueabihf-debug -LE integration

      - name: Install and test consumer
        run: ctest --preset arm-linux-gnueabihf-debug -L integration

  format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format

      - name: Check formatting
        run: |
          ./scripts/format.sh
          git diff --exit-code

  msvc:
    name: MSVC
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure
        env:
          CXXFLAGS: /WX
        run: cmake -S . -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Debug --parallel 2

      - name: Test
        run: ctest --test-dir build --build-config Debug --output-on-failure -LE integration

      - name: Install and test consumer
        run: ctest --test-dir build --build-config Debug --output-on-failure -L integration
